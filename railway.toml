[build]
builder = "NIXPACKS"
buildCommand = "npm install --include=dev && npm run build && npx prisma generate"

[deploy]
startCommand = "node server/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Kalıcı veri: Railway Volume mount /data + PEAKSPOR_DATA_DIR=/data + RAILWAY_RUN_UID=0
# Görseller ayrıca PostgreSQL StoredUpload tablosunda yedeklenir (deploy sonrası geri yüklenir).
